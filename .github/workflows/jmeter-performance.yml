name: JMeter Performance Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Jmeter/**'
      - '.github/workflows/jmeter-performance.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  baseline:
    name: Baseline Test (50 Users)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run baseline performance test
        run: |
          mkdir -p artifacts/baseline
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t Jmeter/demoblaze-baseline-50.jmx \
            -l artifacts/baseline/baseline-results.jtl \
            -e -o artifacts/baseline/html-report

      - name: Upload baseline report
        uses: actions/upload-artifact@v4
        with:
          name: baseline-report
          path: artifacts/baseline

  load150:
    name: Load Test (150 Users)
    runs-on: ubuntu-latest
    needs: baseline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run load test 150
        run: |
          mkdir -p artifacts/load150
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t Jmeter/demoblaze-load-150.jmx \
            -l artifacts/load150/load150-results.jtl \
            -e -o artifacts/load150/html-report

      - name: Upload load150 report
        uses: actions/upload-artifact@v4
        with:
          name: load150-report
          path: artifacts/load150

  load300:
    name: Peak Load Test (300 Users)
    runs-on: ubuntu-latest
    needs: load150

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run load test 300
        run: |
          mkdir -p artifacts/load300
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t Jmeter/demoblaze-load-300.jmx \
            -l artifacts/load300/load300-results.jtl \
            -e -o artifacts/load300/html-report

      - name: Upload load300 report
        uses: actions/upload-artifact@v4
        with:
          name: load300-report
          path: artifacts/load300

  stress500:
    name: Stress Test (500 Users)
    runs-on: ubuntu-latest
    needs: load300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run stress test 500
        run: |
          mkdir -p artifacts/stress500
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t Jmeter/demoblaze-stress-500.jmx \
            -l artifacts/stress500/stress500-results.jtl \
            -e -o artifacts/stress500/html-report

      - name: Upload stress500 report
        uses: actions/upload-artifact@v4
        with:
          name: stress500-report
          path: artifacts/stress500

  endurance:
    name: Endurance Test
    runs-on: ubuntu-latest
    needs: stress500

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run endurance test
        run: |
          mkdir -p artifacts/endurance
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t Jmeter/demoblaze-endurance.jmx \
            -l artifacts/endurance/endurance-results.jtl \
            -e -o artifacts/endurance/html-report

      - name: Upload endurance report
        uses: actions/upload-artifact@v4
        with:
          name: endurance-report
          path: artifacts/endurance

  deploy-pages:
    name: Deploy Reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: endurance
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          path: all-reports

      - name: Create homepage
        run: |
          mkdir -p site
          cat << 'EOF' > site/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <title>JMeter Performance Test Reports</title>
          <style>
          body{
              font-family: Arial, Helvetica, sans-serif;
              background:#0f172a;
              color:white;
              text-align:center;
              padding-top:80px;
          }
          h1{
              font-size:36px;
              margin-bottom:10px;
          }
          .subtitle{
              color:#94a3b8;
              margin-bottom:40px;
          }
          .container{
              display:grid;
              grid-template-columns: repeat(auto-fit,minmax(220px,1fr));
              gap:20px;
              max-width:800px;
              margin:auto;
          }
          .button{
              display:block;
              padding:20px;
              border-radius:12px;
              text-decoration:none;
              font-size:18px;
              font-weight:bold;
              color:white;
              transition:0.2s;
          }
          .baseline{ background:#3b82f6; }
          .load150{ background:#10b981; }
          .load300{ background:#f59e0b; }
          .stress{ background:#ef4444; }
          .endurance{ background:#8b5cf6; }
          .button:hover{
              transform:scale(1.05);
              opacity:0.9;
          }
          .footer{
              margin-top:50px;
              color:#64748b;
          }
          </style>
          </head>
          <body>
          <h1>JMeter Performance Test Reports</h1>
          <p class="subtitle">Demoblaze Product Store Performance Testing</p>
          <div class="container">
          <a class="button baseline" href="./baseline/">
          Baseline Test<br>
          <small>50 Users</small>
          </a>
          <a class="button load150" href="./load150/">
          Load Test<br>
          <small>150 Users</small>
          </a>
          <a class="button load300" href="./load300/">
          Peak Load Test<br>
          <small>300 Users</small>
          </a>
          <a class="button stress" href="./stress500/">
          Stress Test<br>
          <small>500 Users</small>
          </a>
          <a class="button endurance" href="./endurance/">
          Endurance Test<br>
          <small>Long Duration</small>
          </a>
          </div>
          <div class="footer">
          Generated automatically from CI pipeline
          </div>
          </body>
          </html>
          EOF

      - name: Prepare pages content
        run: |
          mkdir -p site/baseline
          mkdir -p site/load150
          mkdir -p site/load300
          mkdir -p site/stress500
          mkdir -p site/endurance

          cp -r all-reports/baseline-report/html-report/* site/baseline/
          cp -r all-reports/load150-report/html-report/* site/load150/
          cp -r all-reports/load300-report/html-report/* site/load300/
          cp -r all-reports/stress500-report/html-report/* site/stress500/
          cp -r all-reports/endurance-report/html-report/* site/endurance/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Build Notification Payload
        if: always()
        run: |
          export REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          python3 - <<'PY'
          import csv, os, json
          
          tests = [
              ("Baseline", "all-reports/baseline-report/baseline-results.jtl", "50"),
              ("Load", "all-reports/load150-report/load150-results.jtl", "150"),
              ("Load", "all-reports/load300-report/load300-results.jtl", "300"),
              ("Stress", "all-reports/stress500-report/stress500-results.jtl", "500"),
              ("Endurance", "all-reports/endurance-report/endurance-results.jtl", "50 (10min)")
          ]
          
          rows = []
          run_num = os.environ.get('GITHUB_RUN_NUMBER', '0')
          report_url = os.environ.get('REPORT_URL', '')
          
          for name, path, users in tests:
              if not os.path.exists(path):
                  continue
              try:
                  with open(path, 'r') as f:
                      reader = csv.DictReader(f)
                      samples = 0
                      errors = 0
                      total_rt = 0
                      for row in reader:
                          samples += 1
                          if row['success'] == 'false':
                              errors += 1
                          total_rt += int(row['elapsed'])
                      
                      avg_rt = round(total_rt / samples) if samples > 0 else 0
                      error_pct = (errors / samples * 100) if samples > 0 else 0
                      rows.append([name, users, samples, errors, f"{error_pct:.2f}%", f"{avg_rt}ms"])
              except Exception as e:
                  print(f"Error parsing {path}: {e}")
          
          # HTML Table for Email
          html_table = "<table border='1' style='border-collapse: collapse; width: 100%; text-align: center; font-family: Arial;'>"
          html_table += "<tr style='background-color: #0066cc; color: white;'><th>Test</th><th>Users</th><th>Samples</th><th>Errors</th><th>Error %</th><th>Avg RT</th></tr>"
          for r in rows:
              html_table += f"<tr><td>{r[0]}</td><td>{r[1]}</td><td>{r[2]}</td><td>{r[3]}</td><td>{r[4]}</td><td>{r[5]}</td></tr>"
          html_table += "</table>"
          
          with open("email_body.html", "w") as f:
              f.write(f"<h3>DemoBlaze Performance Test Results — Run #{run_num}</h3>")
              f.write(html_table)
              f.write(f"<p><a href='{report_url}' style='display: inline-block; padding: 10px 20px; background-color: #0066cc; color: white; text-decoration: none; border-radius: 5px;'>View Full HTML Reports</a></p>")
          
          # Slack Text Table
          slack_table = "```\n"
          slack_table += "| Test      | Users | Samples | Errors | Error % | Avg RT |\n"
          slack_table += "|-----------|-------|---------|--------|---------|--------|\n"
          for r in rows:
              slack_table += f"| {r[0]:<9} | {r[1]:<5} | {r[2]:<7} | {r[3]:<6} | {r[4]:<7} | {r[5]:<6} |\n"
          slack_table += "```"
          
          slack_payload = {
              "text": f"🚀 *JMeter Performance Report — Run #{run_num}*\n\n{slack_table}\n\nView full report: {report_url}"
          }
          with open("slack_payload.json", "w") as f:
              json.dump(slack_payload, f)
          PY

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload-file-path: slack_payload.json
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Send Email report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: JMeter Performance Report - Run #${{ github.run_number }} - ${{ github.repository }}
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USERNAME }}
          secure: false
          html_body: file://email_body.html