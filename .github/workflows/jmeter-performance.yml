name: JMeter Performance Tests

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'jmeter/**'
      - '.github/workflows/jmeter-performance.yml'

jobs:
  baseline:
    name: Baseline Test (50 Users)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run baseline performance test
        run: |
          mkdir -p artifacts/baseline
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t jmeter/demoblaze-baseline-50.jmx \
            -l artifacts/baseline/baseline-results.jtl \
            -e -o artifacts/baseline/html-report

      - name: Upload baseline report
        uses: actions/upload-artifact@v4
        with:
          name: baseline-report
          path: artifacts/baseline

  load150:
    name: Load Test (150 Users)
    runs-on: ubuntu-latest
    needs: baseline

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run load test 150
        run: |
          mkdir -p artifacts/load150
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t jmeter/demoblaze-load-150.jmx \
            -l artifacts/load150/load150-results.jtl \
            -e -o artifacts/load150/html-report

      - name: Upload load150 report
        uses: actions/upload-artifact@v4
        with:
          name: load150-report
          path: artifacts/load150

  load300:
    name: Peak Load Test (300 Users)
    runs-on: ubuntu-latest
    needs: load150

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download and extract JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz

      - name: Run load test 300
        run: |
          mkdir -p artifacts/load300
          apache-jmeter-5.6.3/bin/jmeter -n \
            -t jmeter/demoblaze-load-300.jmx \
            -l artifacts/load300/load300-results.jtl \
            -e -o artifacts/load300/html-report

      - name: Upload load300 report
        uses: actions/upload-artifact@v4
        with:
          name: load300-report
          path: artifacts/load300